name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          # Windows 镜像已全面滚到 VS2026(windows-2025 也不再带 VS2022),旧 node-gyp 11.x
          # 识别不了 VS2026 → "Could not find any Visual Studio installation"。
          # 根治在 package.json overrides 强制 node-gyp ^12.1.0(12.1 起支持 VS2026,
          # @electron/rebuild 自带的 ^11.2 够不到,必须 override)。镜像继续钉 windows-2025
          # 避免 windows-latest 滚动引入新变量。
          - os: windows-2025
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --no-fund --no-audit

      - run: npm run build

      - name: Build Electron (mac)
        if: matrix.platform == 'mac'
        timeout-minutes: 60
        run: npx electron-builder --mac --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: MUNC45J2DU

      - name: Build Electron (win)
        if: matrix.platform == 'win'
        run: npx electron-builder --win --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment when Windows signing certificate is available:
          # CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Build Electron (linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            electron-dist/*.dmg
            electron-dist/*.zip
            electron-dist/*.exe
            electron-dist/*.AppImage
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        # 下游的 Homebrew bump 由 bump-homebrew job 以 reusable workflow 链式调用(见下),
        # 同一 run 内执行,不依赖 release:published 事件 → 用默认 GITHUB_TOKEN 建 Release 即可,无需 PAT。
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # 发版后自动 bump Homebrew tap formula(reusable workflow,复用 HOMEBREW_TAP_TOKEN)。
  bump-homebrew:
    needs: publish
    # 显式判 needs.publish.result:自定义 if 会丢掉隐式 success() 门,
    # 否则 publish 失败时该 job 仍会跑(给不存在的 release 去 bump)。
    if: ${{ needs.publish.result == 'success' && startsWith(github.ref, 'refs/tags/v') }}
    uses: ./.github/workflows/bump-homebrew.yml
    with:
      version: ${{ github.ref_name }}   # vX.Y.Z;被调用方剥前导 v
    # 最小权限:只显式传被调方需要的 HOMEBREW_TAP_TOKEN,不用 secrets: inherit 灌全部 secrets。
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
