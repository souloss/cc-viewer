<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 12px;
    height: 60px;
    display: flex;
    align-items: center;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: drag;
    background: var(--bg);
    color: var(--text);
    border-bottom: 1px solid var(--border);
  }
  /* Theme variables */
  :root {
    --bg: #1a1a1a;
    --bg-tab: #111;
    --bg-tab-active: #2a2a2a;
    --bg-tab-hover: #2a2a2a;
    --text: #aaa;
    --text-active: #e5e5e5;
    --border: #333;
    --accent: #1668dc;
    --close-hover: rgba(255,255,255,0.1);
    /* 待审批小圆环：颜色用 tab-bar 底色（--bg），与工具栏融为一体，
     * 仅靠 keyframes 的 opacity 脉动引导视觉，不抢眼。 */
    --pending-ring: var(--bg);
  }
  [data-theme="light"] {
    --bg: #f0f0f0;
    --bg-tab: #e8e8e8;
    --bg-tab-active: #ffffff;
    --bg-tab-hover: #ffffff;
    --text: #666;
    --text-active: #1a1a1a;
    --border: #ddd;
    --accent: #0969DA;
    --close-hover: rgba(0,0,0,0.08);
    --pending-ring: var(--bg);
  }
  /* macOS traffic lights padding + drag area */
  .traffic-light-spacer {
    width: 70px;
    flex-shrink: 0;
    -webkit-app-region: drag;
    transition: width 0.15s;
  }
  /* Fullscreen 时 macOS 红黄绿按钮隐藏，占位也去掉 */
  body.fullscreen .traffic-light-spacer {
    width: 0;
  }
  /* Right-side drag area */
  .drag-spacer {
    flex-shrink: 0;
    width: 60px;
    -webkit-app-region: drag;
  }
  .tab-container {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    height: 100%;
    align-items: center;
    gap: 4px;
    padding: 8px 0 8px 8px;
    -webkit-app-region: no-drag;
  }
  /* Empty space after tabs + "+" button becomes drag area */
  .tab-drag-fill {
    flex: 1;
    min-width: 20px;
    -webkit-app-region: drag;
  }
  .tab-container::-webkit-scrollbar { height: 0; }
  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    height: 44px;
    max-width: 180px;
    min-width: 60px;
    cursor: pointer;
    white-space: nowrap;
    border-radius: 12px;
    background: var(--bg-tab);
    color: var(--text);
    position: relative;
    transition: background 0.1s, box-shadow 0.1s;
  }
  .tab:hover { background: var(--bg-tab-hover); }
  .tab.active {
    background: var(--bg-tab-active);
    color: var(--text-active);
    box-shadow: inset 0 0 0 2px var(--accent);
  }
  .tab.loading { opacity: 0.6; }
  .tab-name {
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  /* 左侧 16px 状态槽，与右侧 .tab-close 镜像。永远占位，避免 tab 名因状态变化抖动。
   * 默认色 = tab-bar 底色（var(--bg)），与工具栏融为一体几乎不可见；
   * 仅在 .has-pending:not(.active) 时让 border-color 在底色 ↔ var(--text) 之间脉动。
   * 用 border-color 而非 opacity 是因为底色和 inactive tab 底色相差太小，纯 opacity 脉动肉眼不可感知。 */
  .tab-pending {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .tab-pending::before {
    content: '';
    width: 8px;
    height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--pending-ring);
    box-sizing: border-box;
  }
  .tab.has-pending:not(.active) .tab-pending::before {
    animation: tab-pending-pulse 1.4s ease-in-out infinite;
  }
  @keyframes tab-pending-pulse {
    0%, 100% { border-color: var(--pending-ring); }
    50% { border-color: var(--text); }
  }
  .tab-close {
    width: 16px;
    height: 16px;
    border-radius: 3px;
    border: none;
    background: none;
    color: var(--text);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.1s, background 0.1s;
    flex-shrink: 0;
  }
  /* 关闭按钮只在选中的 tab 上显示，未选中的 tab hover 也不显示 */
  .tab.active .tab-close { opacity: 1; }
  .tab-close:hover { background: var(--close-hover); }
  .new-tab-btn {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: none;
    background: none;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin: auto 6px;
    align-self: center;
    -webkit-app-region: no-drag;
    transition: background 0.1s;
  }
  .new-tab-btn:hover { background: var(--close-hover); color: var(--text-active); }
</style>
</head>
<body>
  <div class="traffic-light-spacer"></div>
  <div class="tab-container" id="tabs"><!-- tabs + newBtn rendered here --></div>
  <div class="tab-drag-fill"></div>

<script>
  let tabs = [];
  let activeTabId = null;

  const tabsEl = document.getElementById('tabs');
  const newBtn = document.getElementById('newBtn');

  function render() {
    // tab.name / tab.id 来自 main 进程，最终源头是用户输入的项目名 / 路径，可控字符串。
    // 用 textContent + setAttribute 替代 innerHTML 模板拼接，避免 `</span><img onerror=...>`
    // 之类的项目名逃逸属性 / 注入新元素。close 按钮的 ×（HTML 实体 &times;）改用 × 字面量。
    tabsEl.replaceChildren();
    tabs.forEach(tab => {
      const el = document.createElement('div');
      el.className = 'tab'
        + (tab.id === activeTabId ? ' active' : '')
        + (tab.status === 'loading' ? ' loading' : '')
        + (tab.pending > 0 ? ' has-pending' : '');

      // 左侧状态槽：始终占 16px，避免有/无待审批时 tab 名抖动；
      // .has-pending:not(.active) 时由 CSS 把里面的圆环点亮 + 脉动。
      const pendingEl = document.createElement('span');
      pendingEl.className = 'tab-pending';
      pendingEl.setAttribute('aria-hidden', 'true');
      el.appendChild(pendingEl);

      const nameEl = document.createElement('span');
      nameEl.className = 'tab-name';
      nameEl.setAttribute('title', tab.name);
      nameEl.textContent = (tab.status === 'loading' ? '⏳ ' : '') + tab.name;
      el.appendChild(nameEl);

      const closeBtn = document.createElement('button');
      closeBtn.className = 'tab-close';
      closeBtn.dataset.id = tab.id;
      closeBtn.textContent = '×';
      el.appendChild(closeBtn);

      el.addEventListener('click', (e) => {
        if (e.target.classList.contains('tab-close')) return;
        window.tabAPI.switchTab(tab.id);
      });
      closeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        window.tabAPI.closeTab(tab.id);
      });
      tabsEl.appendChild(el);
    });
    // "+" button always follows the last tab
    const btn = document.createElement('button');
    btn.className = 'new-tab-btn';
    btn.title = 'New project tab';
    btn.textContent = '+';
    btn.addEventListener('click', () => window.tabAPI.newTab());
    tabsEl.appendChild(btn);
  }

  window.tabAPI.onTabsUpdated((newTabs) => {
    tabs = newTabs;
    render();
  });

  window.tabAPI.onTabActivated((tabId) => {
    activeTabId = tabId;
    render();
  });

  window.tabAPI.onThemeChanged((theme) => {
    document.documentElement.setAttribute('data-theme', theme);
  });

  window.tabAPI.onFullscreenChanged?.((isFullscreen) => {
    document.body.classList.toggle('fullscreen', !!isFullscreen);
  });
</script>
</body>
</html>
